<svg 
  viewBox="0 0 100 100" 
  fill="none" 
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background is transparent in favicon, but let's use dark colors for the SVG since most browsers use light tabs, wait actually browsers can have dark tabs too. A solid black logo with white text, or vice versa? Let's use a solid dark rounded rect as background so it always pops. -->
  <rect width="100" height="100" rx="22" fill="#111111" />
  
  <rect x="8" y="8" width="84" height="84" rx="18" stroke="rgba(255,255,255,0.25)" stroke-width="2" />
  
  <path d="M8 30 H 30" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linejoin="miter" fill="none" />
  <path d="M92 50 H 70" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linejoin="miter" fill="none" />
  <path d="M45 8 V 30" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linejoin="miter" fill="none" />
  <path d="M55 92 V 70" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linejoin="miter" fill="none" />
  
  <path d="M8 70 H 20 V 55 H 45" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linejoin="miter" fill="none" />
  <path d="M92 30 H 80 V 70 H 55" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linejoin="miter" fill="none" />

  <!-- J -->
  <path d="M 45 30 V 70 H 30 V 55" stroke="#ffffff" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" fill="none" />
  
  <!-- P -->
  <path d="M 55 70 V 30 H 70 V 50 H 55" stroke="#ffffff" stroke-width="6" stroke-linejoin="miter" stroke-linecap="square" fill="none" />

  <circle cx="45" cy="30" r="3" fill="#ffffff" />
  <circle cx="45" cy="70" r="3" fill="#ffffff" />
  <circle cx="30" cy="55" r="3" fill="#ffffff" />
  
  <circle cx="55" cy="70" r="3" fill="#ffffff" />
  <circle cx="55" cy="30" r="3" fill="#ffffff" />
  <circle cx="70" cy="50" r="3" fill="#ffffff" />
</svg>